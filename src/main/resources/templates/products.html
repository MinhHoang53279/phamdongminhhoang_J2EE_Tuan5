<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Nunito:wght@500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/product-app.css}" />
</head>

<body class="app-body">
    <div class="page-shell">
        <nav class="navbar navbar-expand-lg app-navbar">
            <div class="container-fluid px-3">
                <a class="navbar-brand" th:href="@{/products}">Home</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                    aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/products}">Products</a>
                        </li>
                    </ul>
                    <form class="d-flex" method="get" th:action="@{/products}">
                        <input class="form-control form-control-sm me-2" type="search" placeholder="Search" name="keyword"
                            th:value="${keyword}" />
                        <button class="btn btn-sm btn-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>

        <main class="content-panel">
            <div class="d-flex justify-content-between align-items-center mb-3 gap-2 flex-wrap">
                <h2 class="panel-title mb-0">Products</h2>
                <a class="btn btn-primary btn-sm" th:href="@{/products/create}">Create New Product</a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success py-2" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

            <div class="table-responsive">
                <table class="table table-hover align-middle app-table mb-0">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Image</th>
                            <th>Category Name</th>
                            <th class="text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="6" class="text-center text-muted py-4">Chưa có sản phẩm nào.</td>
                        </tr>
                        <tr th:each="product : ${products}">
                            <td th:text="${product.id}"></td>
                            <td th:text="${product.name}"></td>
                            <td th:text="${product.price}"></td>
                            <td>
                                <img th:if="${product.imageName}" th:src="@{'/uploads/' + ${product.imageName}}"
                                    alt="product image" class="product-thumb" />
                                <span th:unless="${product.imageName}" class="text-muted">No image</span>
                            </td>
                            <td th:text="${product.category.displayName}"></td>
                            <td class="text-center">
                                <a class="btn btn-secondary btn-sm me-1"
                                    th:href="@{/products/edit/{id}(id=${product.id})}">Edit</a>
                                <a class="btn btn-danger btn-sm"
                                    th:href="@{/products/delete/{id}(id=${product.id})}"
                                    onclick="return confirm('Bạn chắc chắn muốn xóa sản phẩm này?');">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
