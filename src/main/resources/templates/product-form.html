<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${formMode == 'edit'} ? 'Edit Product' : 'Create Product'">Product Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Nunito:wght@500;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/product-app.css}" />
</head>

<body class="app-body">
    <div class="page-shell">
        <nav class="navbar navbar-expand-lg app-navbar">
            <div class="container-fluid px-3">
                <a class="navbar-brand" th:href="@{/products}">Home</a>
                <div class="collapse navbar-collapse show">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" th:href="@{/products}">Products</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="content-panel form-wrap">
            <h2 class="panel-title" th:text="${formMode == 'edit'} ? 'Edit Product' : 'Create Product'">Create Product</h2>

            <form method="post" enctype="multipart/form-data" th:object="${product}" class="product-form-vertical"
                th:action="${formMode == 'edit'} ? @{/products/edit/{id}(id=${product.id})} : @{/products/create}">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{imageName}" />

                <div class="mb-3">
                    <label class="form-label" for="name">Name</label>
                    <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Product Name" />
                    <div class="field-warning" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="price">Price</label>
                    <input id="price" type="number" class="form-control" min="1" max="9999999" th:field="*{price}" />
                    <div class="field-warning" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="imageFile">Image</label>
                    <input id="imageFile" type="file" class="form-control" name="imageFile" accept="image/*" />
                    <div class="field-warning" th:if="${#fields.hasErrors('imageName')}" th:errors="*{imageName}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="category">Category</label>
                    <select id="category" class="form-select" th:field="*{category}">
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="category : ${categories}" th:value="${category}" th:text="${category.displayName}"></option>
                    </select>
                    <div class="field-warning" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                </div>

                <div class="mb-3" th:if="${product.imageName}">
                    <span class="current-label">Current image:</span>
                    <img th:src="@{'/uploads/' + ${product.imageName}}" alt="current image" class="product-thumb" />
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success"
                        th:text="${formMode == 'edit'} ? 'Update Product' : 'Add Product'">Add Product</button>
                    <a class="btn btn-outline-secondary" th:href="@{/products}">Back</a>
                </div>
            </form>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
